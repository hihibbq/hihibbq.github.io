<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Overlay Canvas App</title>
    <style>
        body { font-family: sans-serif; margin: 20px; max-width: 800px; }
        .input-group { margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 6px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        canvas { border: 1px solid #ccc; margin-top: 20px; max-width: 100%; height: auto; display: block; }
        textarea { width: 100%; height: 120px; margin-top: 10px; font-family: monospace; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>PNG Image Overlay Tool</h2>
    <p>Enter 5 PNG image URLs (ordered from bottom layer to top layer):</p>

    <div id="url-inputs">
        <div class="input-group"><input type="text" class="img-url" value="https://hihibbq.github.io/frontend/assets/images/creator/base/female/color-0.png" placeholder="Layer 1"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 2"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 3"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 4"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 5"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 6"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 7"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 8"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 9"></div>
        <div class="input-group"><input type="text" class="img-url" placeholder="Layer 10 (Top)"></div>
    </div>

    <button onclick="processImages()">Overlay Images</button>
    <div id="error-msg" class="error"></div>

    <canvas id="output-canvas"></canvas>

    <h3>Blob Content (Data URL / Base64)</h3>
    <textarea id="blob-output" readonly placeholder="Blob data will appear here..."></textarea>

    <script>
        async function processImages() {
            const canvas = document.getElementById('output-canvas');
            const ctx = canvas.getContext('2d');
            const textarea = document.getElementById('blob-output');
            const errorDiv = document.getElementById('error-msg');
            
            errorDiv.textContent = '';
            textarea.value = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const inputs = document.querySelectorAll('.img-url');
            const urls = Array.from(inputs).map(input => input.value.trim()).filter(url => url !== '');

            if (urls.length === 0) {
                errorDiv.textContent = 'Please enter at least one image URL.';
                return;
            }

            try {
                // Load all images in parallel
                const loadPromises = urls.map(url => {
                    return new Promise((resolve, reject) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous'; // Prevents tainted canvas errors for external URLs
                        img.onload = () => resolve(img);
                        img.onerror = () => reject(new Error(`Failed to load image: ${url}`));
                        img.src = url;
                    });
                });

                const images = await Promise.all(loadPromises);

                // Set canvas size to match the largest image dimensions
                const maxWidth = Math.max(...images.map(img => img.width));
                const maxHeight = Math.max(...images.map(img => img.height));
                canvas.width = maxWidth;
                canvas.height = maxHeight;

                // Draw images in sequential order (bottom to top)
                images.forEach(img => {
                    ctx.drawImage(img, 0, 0, maxWidth, maxHeight);
                });

                // Export canvas content as a Blob / DataURL string
                const dataUrl = canvas.toDataURL('image/png');
                textarea.value = dataUrl;

            } catch (error) {
                errorDiv.textContent = error.message + '. Ensure the server permits cross-origin requests (CORS).';
                console.error(error);
            }
        }
    </script>
</body>
</html>
