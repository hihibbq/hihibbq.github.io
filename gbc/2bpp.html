<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2bpp ROM Viewer</title>
    <style>
        canvas { background: #f0f0f0; image-rendering: pixelated; }
    </style>
</head>
<body>
<form>
<input type=text name="url" value="dbz.gb">
<input type=button value="Extract" onclick="loadAndRenderROM(document.forms[0].url.value);">
</form>
    <canvas id="romCanvas" width="256" height="256"></style>
    <script>
// Game Boy monochrome palette (Green shades)
const PALETTE = [
    [155, 188, 15],  // 00: Lightest
    [139, 172, 15],  // 01: Light
    [48, 98, 48],    // 10: Dark
    [8, 24, 32]      // 11: Darkest
];

        async function loadAndRenderROM(url) {
            try {
                const response = await fetch(url);
                const buffer = await response.arrayBuffer();
                const data = new Uint8Array(buffer);
                
                render2bpp(data);
            } catch (err) {
                console.error("Error loading ROM:", err);
            }
        }

        function render2bpp(data) {
            const canvas = document.getElementById('romCanvas');
            const ctx = canvas.getContext('2d');
            
            // Each 8x8 tile takes 16 bytes (2 bytes per row * 8 rows)
            const bytesPerTile = 16;
            const totalTiles = Math.floor(data.length / bytesPerTile);
            
            // Layout configurations
            const tilesPerRow = 32; 
            canvas.width = tilesPerRow * 8;
            canvas.height = Math.ceil(totalTiles / tilesPerRow) * 8;

            const imgData = ctx.createImageData(canvas.width, canvas.height);

            for (let tileIdx = 0; tileIdx < totalTiles; tileIdx++) {
                const tileOffset = tileIdx * bytesPerTile;
                const tileX = (tileIdx % tilesPerRow) * 8;
                const tileY = Math.floor(tileIdx / tilesPerRow) * 8;

                // Process 8 rows of the current tile
                for (let row = 0; row < 8; row++) {
                    const byte1 = data[tileOffset + (row * 2)];
                    const byte2 = data[tileOffset + (row * 2) + 1];

                    // Process 8 pixels in the row
                    for (let col = 0; col < 8; col++) {
                        // Bit plane decoding
                        const bitShift = 7 - col;
                        const lowBit = (byte1 >> bitShift) & 0x01;
                        const highBit = (byte2 >> bitShift) & 0x01;
                        const colorIndex = (highBit << 1) | lowBit;

                        // Map color index to RGB palette
                        const [r, g, b] = PALETTE[colorIndex];

                        // Calculate position in the global canvas canvas buffer
                        const pixelX = tileX + col;
                        const pixelY = tileY + row;
                        const canvasIndex = (pixelY * canvas.width + pixelX) * 4;

                        // Write to ImageData buffer
                        imgData.data[canvasIndex]     = r;   // Red
                        imgData.data[canvasIndex + 1] = g;   // Green
                        imgData.data[canvasIndex + 2] = b;   // Blue
                        imgData.data[canvasIndex + 3] = 255; // Alpha
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Replace with your target binary or ROM URL
        loadAndRenderROM('https://hihibbq.github.io/gbc/dbz.gb');
    </script>
</body>
</html>
